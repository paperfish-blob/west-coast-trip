<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#fff;color:#374151;font-size:13px}
header{background:#111827;color:#fff;padding:0 24px;height:52px;display:flex;align-items:center;flex-shrink:0}
header h1{font-size:17px;font-weight:600;letter-spacing:-0.01em}
.grid-wrap{overflow:auto;height:calc(100vh - 52px);width:100%}
.grid-wrap::-webkit-scrollbar{width:5px;height:5px}
.grid-wrap::-webkit-scrollbar-track{background:#f3f4f6}
.grid-wrap::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}
table.schedule-grid{border-collapse:collapse;table-layout:fixed;width:max-content}
table.schedule-grid th,table.schedule-grid td{border:1px solid #f3f4f6}

/* Sticky header */
thead th{position:sticky;top:0;background:#111827;color:#fff;text-align:center;padding:8px 6px;z-index:10;vertical-align:middle}
thead th.th-time{position:sticky;left:0;top:0;z-index:20;width:62px;min-width:62px;font-size:11px;font-weight:500;letter-spacing:.02em}
thead th.th-day{min-width:168px;width:168px}
.day-n{font-weight:600;font-size:12px}
.day-dt{font-size:10px;opacity:.8;margin-top:2px}
.day-loc{font-size:10px;opacity:.55;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:156px}

/* Body cells */
td.td-time{position:sticky;left:0;background:#f9fafb;width:62px;min-width:62px;text-align:center;font-size:11px;color:#9ca3af;font-weight:500;z-index:5;padding:6px 4px;vertical-align:middle;border-color:#f3f4f6}
td.td-day{min-width:168px;width:168px;padding:3px;vertical-align:top}

/* Activity card */
.card{background:#fff;border:1px solid #e5e7eb;border-radius:6px;border-left-width:3px;padding:4px 22px 4px 7px;cursor:pointer;transition:box-shadow 150ms ease,background 150ms ease;margin-bottom:3px;position:relative;user-select:none}
.card:last-child{margin-bottom:0}
.card:hover{box-shadow:0 1px 6px rgba(0,0,0,.09)}
.card.active{background:#f0f5ff}
.card:focus-visible{outline:2px solid #2563eb;outline-offset:2px}
.card-name{font-weight:600;font-size:11px;color:#1f2937;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-time{font-size:10px;color:#9ca3af;margin-top:1px}
.card-info{font-size:10px;color:#c4c9d4;position:absolute;top:5px;right:6px}

/* Category colours */
.c-sightseeing{border-left-color:#2563eb}
.c-food{border-left-color:#ea580c}
.c-travel{border-left-color:#ca8a04}
.c-accommodation{border-left-color:#16a34a}
.c-other{border-left-color:#9333ea}

/* Floating detail panel */
#detail-panel{display:none;position:fixed;z-index:300;background:#fff;border:1px solid #e5e7eb;border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,.15);width:248px;padding:12px}
#detail-close{position:absolute;top:8px;right:10px;background:none;border:none;font-size:18px;line-height:1;color:#9ca3af;cursor:pointer;padding:0 2px}
#detail-close:hover{color:#374151}
#detail-img{width:100%;height:148px;object-fit:cover;border-radius:6px;margin-bottom:9px;display:block}
#detail-title{font-weight:600;font-size:13px;color:#111827;margin-bottom:2px;padding-right:20px;line-height:1.3}
#detail-time-row{font-size:11px;color:#9ca3af;margin-bottom:7px}
#detail-notes{font-size:11px;color:#374151;line-height:1.55;margin-bottom:10px;min-height:0}
.cat-badge{display:inline-block;font-size:10px;font-weight:500;padding:2px 9px;border-radius:999px;letter-spacing:.03em;text-transform:capitalize}
.b-sightseeing{background:#eff6ff;color:#2563eb}
.b-food{background:#fff7ed;color:#ea580c}
.b-travel{background:#fefce8;color:#ca8a04;border:1px solid #fde68a}
.b-accommodation{background:#f0fdf4;color:#16a34a}
.b-other{background:#faf5ff;color:#9333ea}
</style>
</head>

</div>

const HOURS = [];
for (let i = 6; i <= 23; i++) HOURS.push(i);

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// Build header row
const thead = document.getElementById('grid-head');
const hRow = document.createElement('tr');
const timeTh = document.createElement('th');
timeTh.className = 'th-time';
timeTh.textContent = 'Time';
hRow.appendChild(timeTh);
DAYS.forEach(day => {
  const th = document.createElement('th');
  th.className = 'th-day';
  th.innerHTML = `<div class="day-n">Day ${day.n}</div><div class="day-dt">${esc(day.date)}</div><div class="day-loc" title="${esc(day.loc)}">${esc(day.loc)}</div>`;
  hRow.appendChild(th);
});
thead.appendChild(hRow);

// Build body rows
const tbody = document.getElementById('grid-body');
HOURS.forEach(hour => {
  const tr = document.createElement('tr');

  const timeTd = document.createElement('td');
  timeTd.className = 'td-time';
  timeTd.textContent = String(hour).padStart(2, '0') + ':00';
  tr.appendChild(timeTd);

  DAYS.forEach(day => {
    const td = document.createElement('td');
    td.className = 'td-day';

    const inSlot = day.acts.filter(a => parseInt(a.t.split(':')[0]) === hour);
    inSlot.forEach(act => {
      const cat = act.cat || 'other';
      const imgSrc = IMGS[act.name] || '';

      const card = document.createElement('div');
      card.className = `card c-${cat}`;
      card.tabIndex = 0;
      card.dataset.name = act.name;
      card.dataset.time = act.t;
      card.dataset.cat = cat;
      card.dataset.notes = act.notes || '';
      card.dataset.img = imgSrc;
      card.innerHTML = `<div class="card-name">${esc(act.name)}</div><div class="card-time">${act.t}</div>${act.notes ? '<span class="card-info">ⓘ</span>' : ''}`;
      td.appendChild(card);
    });

    tr.appendChild(td);
  });

  tbody.appendChild(tr);
});

// Floating detail panel
const panel    = document.getElementById('detail-panel');
const pImg     = document.getElementById('detail-img');
const pTitle   = document.getElementById('detail-title');
const pTimeRow = document.getElementById('detail-time-row');
const pNotes   = document.getElementById('detail-notes');
const pBadge   = document.getElementById('detail-badge');
let activeCard = null;

function showPanel(card) {
  if (card.dataset.img) {
    pImg.src = card.dataset.img;
    pImg.style.display = 'block';
    pImg.onerror = () => { pImg.style.display = 'none'; };
  } else {
    pImg.style.display = 'none';
    pImg.src = '';
  }
  pTitle.textContent = card.dataset.name;
  pTimeRow.textContent = card.dataset.time;
  pNotes.textContent = card.dataset.notes;
  pNotes.style.display = card.dataset.notes ? 'block' : 'none';
  pBadge.className = `cat-badge b-${card.dataset.cat}`;
  pBadge.textContent = card.dataset.cat;

  panel.style.display = 'block';

  const rect = card.getBoundingClientRect();
  const pw = 248;
  let left = rect.left;
  let top  = rect.bottom + 8;
  if (left + pw > window.innerWidth - 12) left = window.innerWidth - pw - 12;
  if (left < 8) left = 8;
  if (top + 380 > window.innerHeight) top = Math.max(8, rect.top - 388);
  panel.style.left = left + 'px';
  panel.style.top  = top  + 'px';

  if (activeCard) activeCard.classList.remove('active');
  activeCard = card;
  card.classList.add('active');
}

function hidePanel() {
  panel.style.display = 'none';
  if (activeCard) { activeCard.classList.remove('active'); activeCard = null; }
}

document.addEventListener('click', e => {
  const card = e.target.closest('.card');
  if (card) {
    e.stopPropagation();
    if (activeCard === card) { hidePanel(); return; }
    showPanel(card);
  } else if (!e.target.closest('#detail-panel')) {
    hidePanel();
  }
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { hidePanel(); return; }
  if ((e.key === 'Enter' || e.key === ' ') && document.activeElement.classList.contains('card')) {
    e.preventDefault();
    const card = document.activeElement;
    if (activeCard === card) { hidePanel(); return; }
    showPanel(card);
  }
});

document.getElementById('detail-close').addEventListener('click', e => {
  e.stopPropagation();
  hidePanel();
});
</script>
